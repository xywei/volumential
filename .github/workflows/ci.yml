name: CI
on:
  push:
    branches: [ 'main' ]
  schedule:
    - cron: '17 3 * * 0'
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: crate-ci/typos@v1
        with:
          config: .typos.toml
          files: |
            .github/workflows
            volumential
            README.md
            DEVELOPMENT.md
            pyproject.toml

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Main Script
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          ruff check --select E9,F63,F7,F82

  basedpyright:
    name: Type Checking (basedpyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"
          uv pip install --system basedpyright

          python -m basedpyright -p pyproject.toml --level error

  pytest:
    name: Testing (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python
          export PYTEST_FLAGS="--cov=volumential -p no:github-actions-annotate-failures"
          export CISUPPORT_PARALLEL_PYTEST=no
          export PYTEST_ADDOPTS="--ignore=test/test_volume_fmm.py"

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          curl -L -O https://tiker.net/ci-support-v0
          . ./ci-support-v0

          test_py_project

          python -m pytest -q test/test_volume_fmm.py \
            -k "treebuilder_targets_none_sets_sources_are_targets or meshgen_boxtree_gmsh_export_non_dyadic_bounds or meshgen_boxtree_gmsh_export_rejects_mixed_levels"

  pytest_mac_smoke:
    name: Testing (macOS Smoke)
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3-macos.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python
          export LC_ALL=en_US.UTF-8
          export LANG=en_US.UTF-8
          export PYOPENCL_CTX="portable:0"

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          python -m pytest -q \
            test/test_duffy_tanh_sinh.py \
            test/test_function_extension.py::test_constant_extension_geometry_collection

  nearfield_duffy:
    name: Testing (Nearfield Duffy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          curl -L -O https://tiker.net/ci-support-v0
          . ./ci-support-v0

          rewrite_pyopencl_test
          python -m pytest -q \
            test/test_duffy_tanh_sinh.py \
            test/test_nearfield_potential_table.py \
            test/test_duffy_batched_manufactured.py \
            test/test_nearfield_interaction_completeness.py \
            -k "duffy or completeness_1"

  examples_smoke:
    name: Examples (Smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python
          export VOLUMENTIAL_EXAMPLE_SMOKE=1
          export PYOPENCL_CTX="portable:0"

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          python examples/laplace2d.py

