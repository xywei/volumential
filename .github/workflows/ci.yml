name: CI
on:
  push:
    branches: [ 'main' ]
  schedule:
    - cron: '17 3 * * 0'
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYOPENCL_CTX: 'portable:0'
  PYOPENCL_TEST: 'portable:0'

jobs:
  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: crate-ci/typos@v1
        with:
          config: .typos.toml
          files: |
            .github/workflows
            volumential
            README.md
            DEVELOPMENT.md
            pyproject.toml

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Main Script
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          ruff check --select E9,F63,F7,F82

  basedpyright:
    name: Type Checking (basedpyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"
          uv pip install --system basedpyright

          python -m basedpyright -p pyproject.toml --level error

  pytest:
    name: Testing (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Prepare Test Environment
        shell: micromamba-shell {0}
        run: |
          set -euxo pipefail

          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          python -V
          python -m pip --version

      - name: Run pytest suite (instrumented)
        shell: micromamba-shell {0}
        run: |
          set -euxo pipefail

          export PY_EXE=python
          export PYTHONFAULTHANDLER=1
          export PYTEST_FLAGS="--cov=volumential -vv -o faulthandler_timeout=300"
          export CISUPPORT_PARALLEL_PYTEST=no
          export VOLUMENTIAL_LEVEL_RESTRICTION_DEBUG=1
          export VOLUMENTIAL_LEVEL_RESTRICTION_LOG_EVERY=1
          export VOLUMENTIAL_LEVEL_RESTRICTION_PAIR_LOG_INTERVAL=250000
          export VOLUMENTIAL_LEVEL_RESTRICTION_STAGNATION_ITERS=5
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_PAIR_CHECKS=20000000

          curl -L -O https://tiker.net/ci-support-v0

          (
            while true; do
              echo "[heartbeat] $(date -u +%H:%M:%S) testing-linux still running"
              sleep 60
            done
          ) &
          heartbeat_pid=$!
          trap 'kill "$heartbeat_pid" 2>/dev/null || true' EXIT

          set +e
          timeout --signal=SIGINT --kill-after=120 1800 bash -lc 'source ./ci-support-v0; test_py_project'
          test_status=$?
          set -e

          if [ "$test_status" -eq 124 ]; then
            echo "::error::Linux pytest wrapper timed out after 1800s"
          fi

          exit "$test_status"

  pytest_mac_smoke:
    name: Testing (macOS Smoke)
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3-macos.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python
          export LC_ALL=en_US.UTF-8
          export LANG=en_US.UTF-8
          export PYOPENCL_CTX="portable:0"

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          python -m pytest -q \
            test/test_duffy_tanh_sinh.py \
            test/test_function_extension.py::test_constant_extension_geometry_collection

  nearfield_duffy:
    name: Testing (Nearfield Duffy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          curl -L -O https://tiker.net/ci-support-v0
          . ./ci-support-v0

          rewrite_pyopencl_test
          python -m pytest -q \
            test/test_duffy_tanh_sinh.py \
            test/test_nearfield_potential_table.py \
            test/test_duffy_batched_manufactured.py \
            test/test_nearfield_interaction_completeness.py \
            -k "duffy or completeness_1"

  examples_smoke:
    name: Examples (Smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python
          export VOLUMENTIAL_EXAMPLE_SMOKE=1
          export PYOPENCL_CTX="portable:0"

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          python examples/laplace2d.py

