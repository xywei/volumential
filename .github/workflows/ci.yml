name: CI
on:
  push:
    branches: [ 'main' ]
  schedule:
    - cron: '17 3 * * 0'
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYOPENCL_CTX: 'portable:0'
  PYOPENCL_TEST: 'portable:0'

jobs:
  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: crate-ci/typos@v1
        with:
          config: .typos.toml
          files: |
            .github/workflows
            volumential
            README.md
            DEVELOPMENT.md
            pyproject.toml

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Main Script
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          ruff check --select E9,F63,F7,F82

  basedpyright:
    name: Type Checking (basedpyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"
          uv pip install --system basedpyright

          python -m basedpyright -p pyproject.toml --level error

  pytest:
    name: Testing (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Prepare Test Environment
        shell: micromamba-shell {0}
        run: |
          set -euxo pipefail

          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          python -V
          python -m pip --version

      - name: Run pytest suite (guarded)
        shell: micromamba-shell {0}
        run: |
          set -euxo pipefail

          export PY_EXE=python
          export PYTHONFAULTHANDLER=1
          export PYTEST_FLAGS="--cov=volumential -vv -o faulthandler_timeout=300"
          export CISUPPORT_PARALLEL_PYTEST=no
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_PAIR_CHECKS=20000000
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_NBOXES=500000
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_LEAF_PAIR_TOTAL=50000000000

          curl -L -O https://tiker.net/ci-support-v0

          set +e
          timeout --signal=SIGINT --kill-after=120 3900 bash -c 'source ./ci-support-v0; test_py_project' \
            2>&1 | tee linux-pytest.log
          test_status=${PIPESTATUS[0]}
          set -e

          if [ "$test_status" -eq 124 ]; then
            echo "::error::Linux pytest wrapper timed out after 3900s"
          fi

          exit "$test_status"

      - name: Upload Linux diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testing-linux-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            linux-pytest.log
            pytest.xml
          if-no-files-found: warn

  pytest_no_cov_diagnose:
    name: Testing (Linux No-Cov Diagnose)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 80
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Prepare Test Environment
        shell: micromamba-shell {0}
        run: |
          set -euxo pipefail

          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          python -V
          python -m pip --version

      - name: Run pytest suite (no-cov guarded)
        shell: micromamba-shell {0}
        run: |
          set -euxo pipefail

          export PY_EXE=python
          export PYTHONFAULTHANDLER=1
          export PYTEST_FLAGS="-vv -o faulthandler_timeout=300"
          export CISUPPORT_PARALLEL_PYTEST=no
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_PAIR_CHECKS=20000000
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_NBOXES=500000
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_LEAF_PAIR_TOTAL=50000000000

          curl -L -O https://tiker.net/ci-support-v0

          set +e
          timeout --signal=SIGINT --kill-after=120 3900 bash -c 'source ./ci-support-v0; test_py_project' \
            2>&1 | tee linux-nocov-pytest.log
          test_status=${PIPESTATUS[0]}
          set -e

          if [ "$test_status" -eq 124 ]; then
            echo "::error::Linux no-cov pytest wrapper timed out after 3900s"
          fi

          exit "$test_status"

      - name: Upload Linux no-cov diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testing-linux-nocov-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            linux-nocov-pytest.log
            pytest.xml
          if-no-files-found: warn

  pytest_laplace_diagnose:
    name: Testing (Linux Laplace Diagnose)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Prepare Test Environment
        shell: micromamba-shell {0}
        run: |
          set -euxo pipefail

          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          python -V
          python -m pip --version

      - name: Run Laplace fixture diagnose
        shell: micromamba-shell {0}
        run: |
          set -euxo pipefail

          export PY_EXE=python
          export PYTHONFAULTHANDLER=1
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_PAIR_CHECKS=5000000
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_NBOXES=500000
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_LEAF_PAIR_TOTAL=50000000000

          set +e
          timeout --signal=SIGINT --kill-after=120 900 \
            python -m pytest -s -vv --maxfail=1 --durations=10 \
            --junitxml=pytest-laplace.xml -o faulthandler_timeout=300 \
            test/test_volume_fmm.py::test_volume_fmm_laplace \
            2>&1 | tee linux-laplace-diagnose.log
          test_status=${PIPESTATUS[0]}
          set -e

          if [ "$test_status" -eq 124 ]; then
            echo "::error::Linux laplace diagnose timed out after 900s"
          fi

          exit "$test_status"

      - name: Upload Linux laplace diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testing-linux-laplace-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            linux-laplace-diagnose.log
            pytest-laplace.xml
          if-no-files-found: warn

  pytest_mac_smoke:
    name: Testing (macOS Smoke)
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3-macos.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python
          export LC_ALL=en_US.UTF-8
          export LANG=en_US.UTF-8
          export PYOPENCL_CTX="portable:0"

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          python -m pytest -q \
            test/test_duffy_tanh_sinh.py \
            test/test_function_extension.py::test_constant_extension_geometry_collection

  nearfield_duffy:
    name: Testing (Nearfield Duffy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          curl -L -O https://tiker.net/ci-support-v0
          . ./ci-support-v0

          rewrite_pyopencl_test
          python -m pytest -q \
            test/test_duffy_tanh_sinh.py \
            test/test_nearfield_potential_table.py \
            test/test_duffy_batched_manufactured.py \
            test/test_nearfield_interaction_completeness.py \
            -k "duffy or completeness_1"

  examples_smoke:
    name: Examples (Smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python
          export VOLUMENTIAL_EXAMPLE_SMOKE=1
          export PYOPENCL_CTX="portable:0"

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          python examples/laplace2d.py

