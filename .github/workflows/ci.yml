name: CI
on:
  push:
    branches: [ 'main' ]
  schedule:
    - cron: '17 3 * * 0'
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYOPENCL_CTX: 'portable:0'
  PYOPENCL_TEST: 'portable:0'

jobs:
  pytest:
    name: Testing (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Prepare Test Environment
        shell: micromamba-shell {0}
        run: |
          set -euxo pipefail

          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          python -V
          python -m pip --version

      - name: Run pytest suite (guarded)
        shell: micromamba-shell {0}
        run: |
          set -euxo pipefail

          export PY_EXE=python
          export PYTHONFAULTHANDLER=1
          export PYTEST_FLAGS="-vv -o faulthandler_timeout=300"
          export CISUPPORT_PARALLEL_PYTEST=yes
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_PAIR_CHECKS=20000000
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_NBOXES=500000
          export VOLUMENTIAL_LEVEL_RESTRICTION_MAX_LEAF_PAIR_TOTAL=50000000000

          curl -L -O https://tiker.net/ci-support-v0

          set +e
          timeout --signal=SIGINT --kill-after=120 900 bash -c 'source ./ci-support-v0; test_py_project' \
            2>&1 | tee linux-pytest.log
          test_status=${PIPESTATUS[0]}
          set -e

          if [ "$test_status" -eq 124 ]; then
            echo "::error::Linux pytest wrapper timed out after 900s"
          fi

          exit "$test_status"

      - name: Upload Linux diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testing-linux-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            linux-pytest.log
            pytest.xml
          if-no-files-found: warn

  examples_smoke:
    name: Examples (Smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          generate-run-shell: true
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python
          export VOLUMENTIAL_EXAMPLE_SMOKE=1
          export PYOPENCL_CTX="portable:0"

          python -m pip install --upgrade pip
          python -m pip install uv
          uv pip install --system --editable ".[test]"

          python examples/laplace2d.py
          python examples/helmholtz2d.py
          python examples/helmholtz3d.py

# vim: sw=2
