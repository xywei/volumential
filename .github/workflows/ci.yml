name: CI
on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: crate-ci/typos@master

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Main Script
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          ruff check

  basedpyright:
    name: Type Checking (basedpyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          cache-environment: true
          cache-environment-key: >-
            ${{ runner.os }}-py3-fast-${{ hashFiles('.test-conda-env-py3.yml', 'setup.py') }}
          generate-run-shell: true
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('setup.py', 'setup.cfg', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install --editable .[test]
          python -m pip install basedpyright scipy-stubs matplotlib optype

          python -m basedpyright --baselinemode=auto

  pytest:
    name: Testing (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          cache-environment: true
          cache-environment-key: >-
            ${{ runner.os }}-py3-fast-${{ hashFiles('.test-conda-env-py3.yml', 'setup.py') }}
          generate-run-shell: true
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('setup.py', 'setup.cfg', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python
          export PYTEST_FLAGS="--cov=volumential"

          python -m pip install --upgrade pip
          python -m pip install --editable .[test]

          curl -L -O https://tiker.net/ci-support-v0
          . ./ci-support-v0

          test_py_project

  nearfield_duffy:
    name: Testing (Nearfield Duffy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          cache-environment: true
          cache-environment-key: >-
            ${{ runner.os }}-py3-fast-${{ hashFiles('.test-conda-env-py3.yml', 'setup.py') }}
          generate-run-shell: true
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('setup.py', 'setup.cfg', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python

          python -m pip install --upgrade pip
          python -m pip install --editable .[test]

          curl -L -O https://tiker.net/ci-support-v0
          . ./ci-support-v0

          rewrite_pyopencl_test
          python -m pytest -q \
            test/test_duffy_tanh_sinh.py \
            test/test_nearfield_potential_table.py \
            test/test_duffy_batched_manufactured.py \
            test/test_nearfield_interaction_completeness.py \
            -k "duffy or completeness_1"

  examples_smoke:
    name: Examples (Smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: .test-conda-env-py3.yml
          environment-name: testing
          cache-downloads: true
          cache-environment: true
          cache-environment-key: >-
            ${{ runner.os }}-py3-fast-${{ hashFiles('.test-conda-env-py3.yml', 'setup.py') }}
          generate-run-shell: true
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('setup.py', 'setup.cfg', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Main Script
        shell: micromamba-shell {0}
        run: |
          export PY_EXE=python
          export VOLUMENTIAL_EXAMPLE_SMOKE=1

          python -m pip install --upgrade pip
          python -m pip install --editable .[test]

          python examples/laplace2d.py

