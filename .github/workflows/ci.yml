name: CI
on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]
  schedule:
    - cron: '17 3 * * 0'

jobs:
  flake8:
    name: Linting (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          # matches compat target in setup.py
          python-version: '3.8'
      - name: "Main Script"
        run: |
          export CONDA_ENVIRONMENT=.test-conda-env-py3.yml

          curl -L -O https://tiker.net/ci-support-v0
          . ci-support-v0

          build_py_project_in_conda_env
          install_and_run_flake8 "$(get_proj_name)" examples/*.py test/*.py

  pytest:
    name: Testing (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: "Main Script"
        run: |
          export CONDA_ENVIRONMENT=.test-conda-env-py3.yml
          export PYTEST_FLAGS="--cov=volumential"

          curl -L -O https://tiker.net/ci-support-v0
          . ci-support-v0

          build_py_project_in_conda_env
          test_py_project

  nearfield_duffy:
    name: Testing (Nearfield Duffy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: "Main Script"
        run: |
          export CONDA_ENVIRONMENT=.test-conda-env-py3.yml

          curl -L -O https://tiker.net/ci-support-v0
          . ci-support-v0

          build_py_project_in_conda_env
          rewrite_pyopencl_test
          python -m pip install pytest
          python -m pytest -q \
            test/test_duffy_tanh_sinh.py \
            test/test_nearfield_potential_table.py \
            test/test_duffy_batched_manufactured.py \
            test/test_nearfield_interaction_completeness.py \
            -k "duffy or completeness_1"

  pytest_mac:
    name: Testing (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: "Main Script"
        run: |
          export LC_ALL=en_US.UTF-8
          export LANG=en_US.UTF-8

          export CONDA_ENVIRONMENT=.test-conda-env-py3-macos.yml
          export PYTEST_FLAGS="--cov=volumential"
          export CI_TEST_CONDA_PREFIX="$PWD/.conda-root/envs/testing"
          export CPATH="${CI_TEST_CONDA_PREFIX}/include${CPATH:+:${CPATH}}"
          export LIBRARY_PATH="${CI_TEST_CONDA_PREFIX}/lib${LIBRARY_PATH:+:${LIBRARY_PATH}}"
          export CPPFLAGS="${CPPFLAGS:-} -I${CI_TEST_CONDA_PREFIX}/include"
          export CFLAGS="${CFLAGS:-} -I${CI_TEST_CONDA_PREFIX}/include"
          export LDFLAGS="${LDFLAGS:-} -L${CI_TEST_CONDA_PREFIX}/lib"

          curl -L -O https://tiker.net/ci-support-v0
          . ci-support-v0

          build_py_project_in_conda_env
          test_py_project

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: "Main Script"
        run: |
          export CONDA_ENVIRONMENT=.test-conda-env-py3.yml

          curl -L -O https://tiker.net/ci-support-v0
          . ci-support-v0

          build_py_project_in_conda_env
          build_docs

  examples:
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: "Main Script"
        run: |
          export CONDA_ENVIRONMENT=.test-conda-env-py3.yml

          curl -L -O https://tiker.net/ci-support-v0
          . ci-support-v0
          build_py_project_in_conda_env
          run_examples

# vim: sw=2
